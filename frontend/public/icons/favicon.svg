<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#080b14"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  <!-- Traffic signal body -->
  <rect x="24" y="10" width="16" height="44" rx="4" fill="#0f1623" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Red light -->
  <circle cx="32" cy="20" r="5" fill="#ef4444"/>
  <circle cx="32" cy="20" r="3" fill="#fca5a5" opacity="0.6"/>
  <!-- Amber light -->
  <circle cx="32" cy="32" r="5" fill="#f59e0b"/>
  <circle cx="32" cy="32" r="3" fill="#fde68a" opacity="0.6"/>
  <!-- Green light -->
  <circle cx="32" cy="44" r="5" fill="#10b981"/>
  <circle cx="32" cy="44" r="3" fill="#6ee7b7" opacity="0.6"/>
  <!-- AI pulse lines -->
  <line x1="8" y1="32" x2="22" y2="32" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.6"/>
  <line x1="42" y1="32" x2="56" y2="32" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.6"/>
</svg>
