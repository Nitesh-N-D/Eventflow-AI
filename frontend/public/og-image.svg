<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080b14"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b82f6" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left glow blob -->
  <circle cx="150" cy="315" r="200" fill="#3b82f6" opacity="0.06"/>
  <!-- Right glow blob -->
  <circle cx="1050" cy="315" r="180" fill="#06b6d4" opacity="0.06"/>

  <!-- Logo / icon -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="#3b82f620" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="116" y="130" font-size="36" text-anchor="middle" fill="#3b82f6">⚡</text>

  <!-- Brand name -->
  <text x="80" y="210" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white">EventFlow AI</text>

  <!-- Tagline -->
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">Event-Driven Traffic Impact Prediction</text>
  <text x="80" y="308" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">&amp; Smart Traffic Management</text>

  <!-- Divider line -->
  <line x1="80" y1="355" x2="560" y2="355" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Feature pills -->
  <g transform="translate(80, 385)">
    <!-- Pill 1 -->
    <rect width="180" height="38" rx="19" fill="#3b82f615" stroke="#3b82f640" stroke-width="1"/>
    <text x="90" y="25" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#3b82f6" text-anchor="middle">AI Impact Prediction</text>
    <!-- Pill 2 -->
    <rect x="192" width="180" height="38" rx="19" fill="#10b98115" stroke="#10b98140" stroke-width="1"/>
    <text x="282" y="25" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">Resource Planning</text>
    <!-- Pill 3 -->
    <rect x="384" width="180" height="38" rx="19" fill="#f59e0b15" stroke="#f59e0b40" stroke-width="1"/>
    <text x="474" y="25" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">Diversion Routes</text>
  </g>

  <!-- Right side: Congestion score mockup -->
  <g transform="translate(820, 80)">
    <rect width="300" height="430" rx="20" fill="#0f162380" stroke="#1e2d45" stroke-width="1.5"/>

    <!-- Score circle -->
    <circle cx="150" cy="130" r="80" fill="none" stroke="#1e2d45" stroke-width="10"/>
    <circle cx="150" cy="130" r="80" fill="none" stroke="#ef4444" stroke-width="10"
      stroke-dasharray="418" stroke-dashoffset="46" stroke-linecap="round" transform="rotate(-90 150 130)"/>
    <text x="150" y="122" font-family="Inter, monospace" font-size="42" font-weight="800" fill="white" text-anchor="middle">92</text>
    <text x="150" y="150" font-family="Inter, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">/ 100</text>

    <!-- Traffic level badge -->
    <rect x="75" y="232" width="150" height="36" rx="18" fill="#ef444420" stroke="#ef444440" stroke-width="1.5"/>
    <text x="150" y="256" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">CRITICAL</text>

    <!-- Stats row -->
    <g transform="translate(20, 295)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Officers</text>
      <text x="0" y="22" font-family="Inter, monospace" font-size="22" font-weight="700" fill="white">50</text>
      <text x="90" y="0" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Barricades</text>
      <text x="90" y="22" font-family="Inter, monospace" font-size="22" font-weight="700" fill="white">18</text>
      <text x="190" y="0" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Delay</text>
      <text x="190" y="22" font-family="Inter, monospace" font-size="22" font-weight="700" fill="#f59e0b">60m</text>
    </g>

    <!-- Data provenance badge -->
    <rect x="25" y="370" width="250" height="30" rx="8" fill="#10b98110" stroke="#10b98130" stroke-width="1"/>
    <text x="150" y="390" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#10b981" text-anchor="middle">Real ASTRAM Bengaluru Data</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#0f162360"/>
  <text x="80" y="605" font-family="Inter, sans-serif" font-size="16" fill="#475569">
    Built by T. S. Bhuvaneshwar · N. D. Nitesh · L. Jayeshwar · S. Nithiswaran
  </text>
  <text x="1120" y="605" font-family="Inter, sans-serif" font-size="14" fill="#3b82f6" text-anchor="end">
    Flipkart Gridlock 2.0 · Round 2
  </text>
</svg>
